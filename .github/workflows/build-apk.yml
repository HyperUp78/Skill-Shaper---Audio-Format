name: Build & Release APK

on:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install .NET MAUI Android workload
        run: dotnet workload install maui-android

      - name: Build APK
        run: |
          dotnet publish src/SkillShaper.AutoDj/SkillShaper.AutoDj.csproj \
            -f net9.0-android \
            -c Release \
            /p:AndroidPackageFormat=apk \
            /p:PublishTrimmed=false \
            /p:RunAOTCompilation=false \
            /p:AndroidEnableProfiledAot=false \
            /p:AndroidSigningKeyStore="" \
            /p:AndroidKeyStore=false

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find . -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkillShaper-AutoDJ-unsigned
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: autodj-v1.0.7-build-${{ github.run_number }}
          name: SkillShaper AutoDJ v1.0.7 (Build ${{ github.run_number }})
          body: |
            Automated build from commit ${{ github.sha }}

            ## Fixes in this build
            - Fixed launch crash: removed double LaunchAsync race condition
            - Guarded InitializeComponent() with try/catch
            - Deferred DeckController[] initialization to OnAppearing()
          files: ${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
